<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperBet — Trade</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
<div class="nav-left">
<a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>HyperBet</a>
<div class="nav-menu">
<a href="index.html" class="nav-item on">Trade</a>
<a href="vault.html" class="nav-item">Vault</a>
<a href="risk.html" class="nav-item">Risk</a>
<a href="leaderboard.html" class="nav-item">Leaderboard</a>
<a href="docs.html" class="nav-item">Docs</a>
</div>
</div>
<div class="nav-right">
<div class="pill"><span class="dot"></span>HyperEVM</div>
<button class="btn-g" id="walletBtn">Connect</button>
</div>
</nav>

<div class="topbar">
<div class="tb-item"><span class="tb-label">24h Volume</span><span class="tb-val">$2,184,320</span></div>
<div class="tb-item"><span class="tb-label">TVL</span><span class="tb-val">$4,231,500</span></div>
<div class="tb-item"><span class="tb-label">Open Interest</span><span class="tb-val">$1,792,100</span></div>
<div class="tb-item"><span class="tb-label">HLP APY</span><span class="tb-val g">18.4%</span></div>
<div class="tb-item"><span class="tb-label">Utilization</span><span class="tb-val">42.3%</span></div>
<div class="tb-item"><span class="tb-label">Markets</span><span class="tb-val">24</span></div>
</div>

<div class="grid">
<div class="col-l">
<div class="filters">
<span class="filters-title">Markets</span>
<div class="f-row">
<button class="f-btn on" onclick="filterMkts('all',this)">All</button>
<button class="f-btn" onclick="filterMkts('FOOTBALL',this)">Football</button>
<button class="f-btn" onclick="filterMkts('BASKETBALL',this)">Basketball</button>
<button class="f-btn" onclick="filterMkts('TENNIS',this)">Tennis</button>
<button class="f-btn" onclick="filterMkts('ESPORTS',this)">Esports</button>
</div>
</div>
<div id="M"></div>
</div>
<div class="col-r">
<div class="slip-head"><span>Bet Slip</span><span class="slip-badge" id="SC">0</span></div>
<div class="slip-empty" id="SE">Click odds to add selection</div>
<div class="slip-body" id="SB">
<div class="s-card">
<div class="s-evt" id="XE">-</div>
<div class="s-row"><span class="s-pick" id="XP">-</span><span class="s-odds" id="XO">-</span></div>
<button class="s-remove" id="removeBtn">&#10005;</button>
</div>
<div class="s-input">
<label>Stake USDC</label>
<input id="SI" type="number" placeholder="0.00" oninput="calc()">
<div class="q-row">
<button class="q-btn" onclick="ss(10)">10</button>
<button class="q-btn" onclick="ss(25)">25</button>
<button class="q-btn" onclick="ss(50)">50</button>
<button class="q-btn" onclick="ss(100)">100</button>
<button class="q-btn" onclick="ss(500)">500</button>
<button class="q-btn" onclick="ss(1000)">1K</button>
</div>
</div>
<div class="s-summary">
<div class="s-srow"><span class="l">Odds</span><span class="v" id="DO">-</span></div>
<div class="s-srow"><span class="l">Payout</span><span class="v g" id="DP">$0.00</span></div>
<div class="s-srow"><span class="l">Profit</span><span class="v g" id="DPR">$0.00</span></div>
<div class="s-srow"><span class="l">Risk Engine</span><span class="v ok">&#10003; Passed</span></div>
<div class="s-srow"><span class="l">Max Bet</span><span class="v">$47,200</span></div>
</div>
<button class="btn-place" id="placeBetBtn">Place Bet</button>
</div>
</div>
</div>

<div class="t-wrap" id="TW"></div>
<script src="app.js"></script>
</body>
</html>
